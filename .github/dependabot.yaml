version: 2

updates:
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    groups:
      php-platform:
        patterns:
          - php
        update-types:
          - minor
          - patch
      composer-minor-and-patch:
        patterns:
          - "*"
        exclude-patterns:
          - php
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: php
        versions:
          - "<8.3"
